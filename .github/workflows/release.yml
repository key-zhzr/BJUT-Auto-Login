name: Release Multi-Platform App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc --config "{\"bundle\":{\"windows\":{\"webviewInstallMode\":{\"type\":\"offlineInstaller\"}}}}"'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-latest' && 'aarch64-pc-windows-msvc,x86_64-pc-windows-msvc' || '' }}

      - name: Install NPM dependencies
        run: npm install

      - name: Get version
        id: get_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          includeRelease: false
          args: ${{ matrix.args }}

      - name: Rename and Prepare Assets
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          mkdir -p release-artifacts
          
          # Find macOS DMG
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.args }}" == *"--target aarch64-apple-darwin"* ]]; then
              cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/BJUT-Auto-Login_${VERSION}_macOS_arm64.dmg || true
            else
              cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/BJUT-Auto-Login_${VERSION}_macOS_x64.dmg || true
            fi
          fi
          
          # Find Windows Installer
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            SUFFIX=""
            if [[ "${{ matrix.args }}" == *"offlineInstaller"* ]]; then
              SUFFIX="_Offline"
            fi
            cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe release-artifacts/BJUT-Auto-Login_${VERSION}_Windows_x64${SUFFIX}.exe || true
          fi
          
          # Find Linux Deb and AppImage
          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            cp src-tauri/target/release/bundle/deb/*.deb release-artifacts/BJUT-Auto-Login_${VERSION}_Linux_x64.deb || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage release-artifacts/BJUT-Auto-Login_${VERSION}_Linux_x64.AppImage || true
          fi

      - name: Upload Local Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.platform }}-${{ strategy.job-index }}
          path: release-artifacts/*

  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup NDK
        run: echo "y" | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Install NPM dependencies
        run: npm install

      - name: Build Tauri Android App
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
        run: npm run tauri android build -- --target aarch64 --apk

      - name: Prepare APKs for signing
        run: |
          mkdir -p apk-to-sign
          find src-tauri/gen/android/app/build/outputs/apk -name "*-unsigned.apk" -exec cp {} apk-to-sign/ \;

      - name: Sign Android Release
        uses: ilharp/sign-android-release@v1
        id: sign_app
        with:
          releaseDir: apk-to-sign
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyAlias: key0
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Get version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename and Prepare Android Assets
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          mkdir -p android-release
          cp apk-to-sign/app-aarch64-release-unsigned-signed.apk android-release/BJUT-Auto-Login_${VERSION}_Android_arm64.apk || true

      - name: Upload Local Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-artifact
          path: android-release/*.apk

  build-android-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup NDK
        run: echo "y" | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Install NPM dependencies
        run: npm install

      - name: Build Tauri Android App
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
        run: npm run tauri android build -- --target x86_64 --apk

      - name: Prepare APKs for signing
        run: |
          mkdir -p apk-to-sign
          find src-tauri/gen/android/app/build/outputs/apk -name "*-unsigned.apk" -exec cp {} apk-to-sign/ \;

      - name: Sign Android Release
        uses: ilharp/sign-android-release@v1
        id: sign_app
        with:
          releaseDir: apk-to-sign
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyAlias: key0
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Get version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename and Prepare Android Assets
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          mkdir -p android-release
          cp apk-to-sign/app-x86_64-release-unsigned-signed.apk android-release/BJUT-Auto-Login_${VERSION}_Android_x86_64.apk || true

      - name: Upload Local Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-x86_64-artifact
          path: android-release/*.apk

  publish-release:
    needs: [build-desktop, build-android-arm64, build-android-x86_64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-release-artifacts

      - name: Flatten folder structure
        shell: python
        run: |
          import os
          import shutil
          
          src_dir = "all-release-artifacts"
          dest_dir = "release-files"
          os.makedirs(dest_dir, exist_ok=True)
          
          print("Flattening files from {} to {}...".format(src_dir, dest_dir))
          file_count = 0
          for root, dirs, files in os.walk(src_dir):
              for file in files:
                  src_path = os.path.join(root, file)
                  dest_path = os.path.join(dest_dir, file)
                  print("Copying {} -> {}".format(src_path, dest_path))
                  shutil.copy2(src_path, dest_path)
                  file_count += 1
          
          print("Successfully flattened {} files.".format(file_count))
          if file_count == 0:
              raise Exception("No release files were found to upload!")

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: 'BJUT-Auto-Login v${{ steps.get_version.outputs.version }}'
          draft: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
