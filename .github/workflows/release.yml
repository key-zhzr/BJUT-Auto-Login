name: Release Multi-Platform App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc --config "{\"bundle\":{\"windows\":{\"webviewInstallMode\":{\"type\":\"offlineInstaller\"}}}}"'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-latest' && 'aarch64-pc-windows-msvc,x86_64-pc-windows-msvc' || '' }}

      - name: Install NPM dependencies
        run: npm install

      - name: Get version
        id: get_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          includeRelease: false
          args: ${{ matrix.args }}

      - name: Rename and Prepare Assets
        shell: python
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARGS: ${{ matrix.args }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          import os
          import shutil
          import sys
          
          platform = os.environ.get("MATRIX_PLATFORM", "")
          args = os.environ.get("MATRIX_ARGS", "")
          version = os.environ.get("VERSION", "")
          
          os.makedirs("release-artifacts", exist_ok=True)
          print("Searching for artifacts on platform={}, args={}, version={}...".format(platform, args, version))
          
          copied = False
          for root, dirs, files in os.walk("src-tauri/target"):
              if "debug" in root.split(os.sep):
                  continue
              for file in files:
                  file_path = os.path.join(root, file)
                  
                  # macOS
                  if platform == "macos-latest" and file.endswith(".dmg"):
                      if "aarch64" in args:
                          dest = "release-artifacts/BJUT-Auto-Login_{}_macOS_arm64.dmg".format(version)
                      else:
                          dest = "release-artifacts/BJUT-Auto-Login_{}_macOS_x64.dmg".format(version)
                      print("Found macOS DMG: {} -> {}".format(file_path, dest))
                      shutil.copy2(file_path, dest)
                      copied = True
                      
                  # Windows
                  elif platform == "windows-latest" and file.endswith(".exe") and "bundle" in file_path:
                      suffix = "_Offline" if "offlineInstaller" in args else ""
                      dest = "release-artifacts/BJUT-Auto-Login_{}_Windows_x64{}.exe".format(version, suffix)
                      print("Found Windows EXE: {} -> {}".format(file_path, dest))
                      shutil.copy2(file_path, dest)
                      copied = True
                      
                  # Linux
                  elif platform == "ubuntu-22.04" and "bundle" in file_path:
                      if file.endswith(".deb"):
                          dest = "release-artifacts/BJUT-Auto-Login_{}_Linux_x64.deb".format(version)
                          print("Found Linux DEB: {} -> {}".format(file_path, dest))
                          shutil.copy2(file_path, dest)
                          copied = True
                      elif file.endswith(".AppImage"):
                          dest = "release-artifacts/BJUT-Auto-Login_{}_Linux_x64.AppImage".format(version)
                          print("Found Linux AppImage: {} -> {}".format(file_path, dest))
                          shutil.copy2(file_path, dest)
                          copied = True
          
          if not copied:
              print("Error: No artifacts were found!")
              sys.exit(1)
          else:
              print("Successfully copied all artifacts.")

      - name: Upload Local Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.platform }}-${{ strategy.job-index }}
          path: release-artifacts/*

  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup NDK
        run: echo "y" | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Install NPM dependencies
        run: npm install

      - name: Build Tauri Android App
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
        run: npm run tauri android build -- --target aarch64 --apk

      - name: Prepare APKs for signing
        run: |
          mkdir -p apk-to-sign
          find src-tauri/gen/android/app/build/outputs/apk -name "*-unsigned.apk" -exec cp {} apk-to-sign/ \;

      - name: Sign Android Release
        uses: ilharp/sign-android-release@v1
        id: sign_app
        with:
          releaseDir: apk-to-sign
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyAlias: key0
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Get version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename and Prepare Android Assets
        shell: python
        env:
          VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          import os
          import shutil
          import sys
          
          version = os.environ.get("VERSION", "")
          os.makedirs("android-release", exist_ok=True)
          
          found = False
          for file in os.listdir("apk-to-sign"):
              if file.endswith("-signed.apk") or (file.endswith(".apk") and "unsigned" not in file):
                  src = os.path.join("apk-to-sign", file)
                  dest = "android-release/BJUT-Auto-Login_{}_Android_arm64.apk".format(version)
                  print("Found signed APK: {} -> {}".format(src, dest))
                  shutil.copy2(src, dest)
                  found = True
                  break
          
          if not found:
              print("Error: No signed APK found!")
              sys.exit(1)

      - name: Upload Local Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-artifact
          path: android-release/*.apk

  build-android-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup NDK
        run: echo "y" | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Install NPM dependencies
        run: npm install

      - name: Build Tauri Android App
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
        run: npm run tauri android build -- --target x86_64 --apk

      - name: Prepare APKs for signing
        run: |
          mkdir -p apk-to-sign
          find src-tauri/gen/android/app/build/outputs/apk -name "*-unsigned.apk" -exec cp {} apk-to-sign/ \;

      - name: Sign Android Release
        uses: ilharp/sign-android-release@v1
        id: sign_app
        with:
          releaseDir: apk-to-sign
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyAlias: key0
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Get version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename and Prepare Android Assets
        shell: python
        env:
          VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          import os
          import shutil
          import sys
          
          version = os.environ.get("VERSION", "")
          os.makedirs("android-release", exist_ok=True)
          
          found = False
          for file in os.listdir("apk-to-sign"):
              if file.endswith("-signed.apk") or (file.endswith(".apk") and "unsigned" not in file):
                  src = os.path.join("apk-to-sign", file)
                  dest = "android-release/BJUT-Auto-Login_{}_Android_x86_64.apk".format(version)
                  print("Found signed APK: {} -> {}".format(src, dest))
                  shutil.copy2(src, dest)
                  found = True
                  break
          
          if not found:
              print("Error: No signed APK found!")
              sys.exit(1)

      - name: Upload Local Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-x86_64-artifact
          path: android-release/*.apk

  publish-release:
    needs: [build-desktop, build-android-arm64, build-android-x86_64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-release-artifacts

      - name: Flatten folder structure
        shell: python
        run: |
          import os
          import shutil
          
          src_dir = "all-release-artifacts"
          dest_dir = "release-files"
          os.makedirs(dest_dir, exist_ok=True)
          
          print("Flattening files from {} to {}...".format(src_dir, dest_dir))
          file_count = 0
          for root, dirs, files in os.walk(src_dir):
              for file in files:
                  src_path = os.path.join(root, file)
                  dest_path = os.path.join(dest_dir, file)
                  print("Copying {} -> {}".format(src_path, dest_path))
                  shutil.copy2(src_path, dest_path)
                  file_count += 1
          
          print("Successfully flattened {} files.".format(file_count))
          if file_count == 0:
              raise Exception("No release files were found to upload!")

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: 'BJUT-Auto-Login v${{ steps.get_version.outputs.version }}'
          draft: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
